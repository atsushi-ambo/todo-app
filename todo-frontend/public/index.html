<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Meta tags for responsiveness and character set -->
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Page title -->
  <title>Multi-tenant To-Do List App</title>
  
  <!-- Link to the compiled and minified CSS -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  
  <!-- Link to custom CSS file -->
  <link rel="stylesheet" href="/static/css/styles.css">
  
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand" href="/">To-Do List App</a>
    </div>
  </nav>

  <!-- Main container -->
  <div class="container mt-5">
    <!-- Heading -->
    <h1 class="text-center mb-5">Multi-tenant To-Do List</h1>
    
    <!-- Task input form -->
    <div id="task-form">
      <!-- Vue app will be injected here -->
    </div>
    
    <!-- Task list -->
    <div id="task-list">
      <!-- Vue app will be injected here -->
    </div>
  </div>
  
  <!-- Link to the required JavaScript libraries -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  
  <!-- Link to the Vue.js library -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12"></script>
  
  <!-- Link to the custom JavaScript file -->
  <script src="/static/js/app.js"></script>
  
</body>
</html>
